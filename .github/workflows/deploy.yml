name: Deploy to ECS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # ✅ FIX 1: Configure AWS Credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # ✅ FIX 2: Login to ECR (correct way)
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    # ✅ Build Docker Image
    - name: Build Docker Image
      run: docker build -t ecs-node-app .

    - name: Set Image Tag
      run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV
    
    - name: Build Image
      run: docker build -t ecs-node-app .
    
    - name: Tag Image
      run: docker tag ecs-node-app:latest ${{ secrets.ECR_URI }}:${IMAGE_TAG}
    
    - name: Push Image
      run: docker push ${{ secrets.ECR_URI }}:${IMAGE_TAG}

    - name: Update ECS Task Definition
      run: |
        TASK_DEF=$(aws ecs describe-task-definition --task-definition ecs-task-def:2 --query taskDefinition)
    
        NEW_TASK_DEF=$(echo $TASK_DEF | jq --arg IMAGE "${{ secrets.ECR_URI }}:${IMAGE_TAG}" \
        '.containerDefinitions[0].image=$IMAGE')
    
        echo $NEW_TASK_DEF > new-task-def.json
    
        aws ecs register-task-definition --cli-input-json file://new-task-def.json
  
    # ✅ Deploy to ECS
    - name: Deploy to ECS
      run: |
        aws ecs update-service \
        --cluster esc-cluster \
        --service ecs-task-def-service-hzn34jf2 \
        --force-new-deployment
